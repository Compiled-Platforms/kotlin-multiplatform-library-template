version: 2
updates:
  # Gradle dependencies (includes libs.versions.toml)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 1

    # Manually managed: Kotlin, AGP, Compose, Gradle wrapper.
    # See https://kotlinlang.org/docs/multiplatform/multiplatform-compatibility-guide.html
    # Dependabot has no max-version pin; ignore all update types for these ecosystems.
    ignore:
      - dependency-name: "org.jetbrains.kotlin*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      - dependency-name: "com.android*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      - dependency-name: "org.jetbrains.compose*"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      - dependency-name: "gradle"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"
      - dependency-name: "gradle-wrapper"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

    groups:
      all-dependencies:
        patterns:
          - "*"

    labels:
      - "dependencies"
      - "gradle"

    # MUST be "chore" to prevent semantic-release version bumps
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"

  # Python dependencies (MkDocs)
  - package-ecosystem: "pip"
    directory: "/docs"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    groups:
      all-python:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "documentation"
    commit-message:
      prefix: "chore(docs)"
